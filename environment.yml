# Human-readable development spec — use >= pins for flexibility.
# For reproducible installs (collaborators, new machines), use:
#   conda env create -f environment.lock.yml
# To update the lock file after changing this file:
#   conda env export -n morpheus --no-builds > environment.lock.yml
name: morpheus
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pyqt6
  - tifffile>=2024.1
  - pandas>=2.0
  - numpy>=1.24
  - scikit-image>=0.21
  - matplotlib>=3.7
  - openpyxl
  - pip
  - pip:
      - "cellpose[gui]>=4.0"
      - "fastapi>=0.100"
      - "uvicorn[standard]>=0.20"
      - "pyqtgraph>=0.13"
      - "pytest>=8.0"
      - "httpx>=0.27"
